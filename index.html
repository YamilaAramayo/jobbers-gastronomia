<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbers Argentina — Gastronomía</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Jobbers <span>Gastronomía</span></div>
        <div class="nav-buttons">
            <button class="btn-secundary" onclick="abrirModal('login')">Iniciar Sesión</button>
            <button class="btn-primary" onclick="abrirModal('registro')">Registrarme</button>
        </div>
    </header>

    <main class="container">
        <!-- Tarjeta Express para Empleadores Urgentes -->
        <section class="card-express">
            <h2>⚡ ¿NECESITÁS PERSONAL HOY?</h2>
            <p>Publicá tu búsqueda urgente y llegá a los mejores perfiles.</p>
            <form id="express-form">
                <select id="puesto" required>
                    <option value="">Seleccionar Puesto</option>
                    <option value="Bartender">Bartender</option>
                    <option value="Mozo/Azafata">Mozo / Azafata</option>
                    <option value="Cocinero/a">Cocinero/a</option>
                    <option value="Bachero/a">Bachero/a</option>
                </select>
                <select id="zona" required>
                    <option value="">Seleccionar Zona</option>
                    <option value="Nueva Córdoba">Nueva Córdoba</option>
                    <option value="Güemes">Güemes</option>
                    <option value="Centro">Centro</option>
                    <option value="Cerro de las Rosas">Cerro de las Rosas</option>
                </select>
                <select id="turno" required>
                    <option value="">Seleccionar Turno</option>
                    <option value="Turno Noche">Turno Noche</option>
                    <option value="Turno Tarde">Turno Tarde</option>
                    <option value="Turno Mañana">Turno Mañana</option>
                </select>
                <button type="submit" class="btn-whatsapp">💬 ENVIAR POR WHATSAPP</button>
            </form>
        </section>

        <!-- Listado Dinámico de Ofertas -->
        <section class="vacantes-section">
            <h3>Búsquedas Destacadas</h3>
            <div id="vacantes-container" class="grid-vacantes">
                <p>Cargando ofertas en tiempo real...</p>
            </div>
        </section>
    </main>

    <!-- Modal Dinámico Autenticación / Postulación -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
