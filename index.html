<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbers Argentina — Portal Gastronómico</title>
    <!-- Fuente Google Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Hoja de Estilos Externa -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NOTIFICACIONES TOAST -->
    <div id="toast-container" class="toast-container"></div>

    <!-- BARRA DE NAVEGACIÓN -->
    <header class="navbar">
        <div class="logo">
            Jobbers <span>Gastronomía</span>
        </div>
        <div class="nav-buttons" id="nav-actions">
            <!-- Se llena dinámicamente desde JavaScript -->
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container">
        
        <!-- TARJETA EXPRESS PARA EMPRESAS (WHATSAPP) -->
        <section class="card-express">
            <div class="express-header">
                <h2>⚡ ¿NECESITÁS PERSONAL HOY?</h2>
                <p>Publicá tu búsqueda en segundos y llegá a los mejores perfiles calificados.</p>
            </div>

            <form id="express-form" class="express-grid">
                <div class="form-group">
                    <label for="puesto">Puesto requerido</label>
                    <select id="puesto" required>
                        <option value="" disabled selected>Seleccionar Puesto</option>
                        <option value="Bartender">Bartender</option>
                        <option value="Mozo / Azafata">Mozo / Azafata</option>
                        <option value="Cocinero/a">Cocinero/a</option>
                        <option value="Bachero/a">Bachero/a</option>
                        <option value="Ayudante de Cocina">Ayudante de Cocina</option>
                        <option value="Encargado/a de Local">Encargado/a de Local</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="zona">Ubicación / Zona</label>
                    <select id="zona" required>
                        <option value="" disabled selected>Seleccionar Zona</option>
                        <option value="Nueva Córdoba">Nueva Córdoba</option>
                        <option value="Güemes">Güemes</option>
                        <option value="Centro">Centro</option>
                        <option value="Cerro de las Rosas">Cerro de las Rosas</option>
                        <option value="Alta Córdoba">Alta Córdoba</option>
                        <option value="General Paz">General Paz</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="turno">Horario de Trabajo</label>
                    <select id="turno" required>
                        <option value="" disabled selected>Seleccionar Turno</option>
                        <option value="Turno Noche">Turno Noche</option>
                        <option value="Turno Tarde">Turno Tarde</option>
                        <option value="Turno Mañana">Turno Mañana</option>
                        <option value="Turno Cortado / Rotativo">Turno Cortado / Rotativo</option>
                    </select>
                </div>

                <button type="submit" class="btn-whatsapp">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    ENVIAR POR WHATSAPP
                </button>
            </form>
        </section>

        <!-- BÚSQUEDAS Y OFERTAS DESTACADAS -->
        <section class="vacantes-section">
            <div class="section-header">
                <h3>Ofertas Laborales Destacadas</h3>
                <div class="filter-controls">
                    <input type="text" id="search-filter" placeholder="Buscar por puesto o empresa..." onkeyup="filtrarVacantes()">
                </div>
            </div>

            <div id="vacantes-container" class="grid-vacantes"></div>
        </section>

    </main>

    <footer class="footer">
        <p>&copy; 2026 Jobbers Argentina. Todos los derechos reservados. Especialistas en Reclutamiento Gastronómico.</p>
    </footer>

    <!-- MODAL DINÁMICO -->
    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Script JS Externo -->
    <script src="script.js"></script>
</body>
</html>
